name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
          - os: ubuntu-latest
            platform: linux
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      
      - name: Install dependencies
        working-directory: frontend
        run: npm ci
      
      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            fakeroot \
            dpkg \
            rpm \
            libgtk-3-0 \
            libnss3 \
            libxss1 \
            libasound2t64 \
            libxtst6 \
            libx11-xcb1 \
            libxcomposite1 \
            libxdamage1 \
            libxrandr2 \
            libgbm1 \
            libpango-1.0-0 \
            libcairo2 \
            libatk1.0-0 \
            libatk-bridge2.0-0
      
      - name: Package app
        working-directory: frontend
        run: npm run build:${{ matrix.platform }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_BACKEND_URL: https://desktop-application-postman.onrender.com

      # Only collect the final distributable files, not internal Electron files
      - name: Collect Windows artifacts
        if: matrix.platform == 'win'
        run: |
          mkdir -p dist-artifacts
          cp frontend/release/*.exe dist-artifacts/ 2>/dev/null || true
          cp frontend/release/*.exe.blockmap dist-artifacts/ 2>/dev/null || true
          cp frontend/release/latest.yml dist-artifacts/ 2>/dev/null || true
        shell: bash

      - name: Collect Linux artifacts
        if: matrix.platform == 'linux'
        run: |
          mkdir -p dist-artifacts
          cp frontend/release/*.AppImage dist-artifacts/ 2>/dev/null || true
          cp frontend/release/*.deb dist-artifacts/ 2>/dev/null || true
          cp frontend/release/*.rpm dist-artifacts/ 2>/dev/null || true
          cp frontend/release/latest-linux.yml dist-artifacts/ 2>/dev/null || true
        shell: bash

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform }}
          path: dist-artifacts/
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-win
          path: artifacts/

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-linux
          path: artifacts/

      - name: List release files
        run: ls -la artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          files: artifacts/*
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}